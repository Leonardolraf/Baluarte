# Baluarte V2 — backend (API + SQLite) + frontend (Vite).
# Subir tudo:  docker compose up --build
# Depois: frontend em http://localhost:3000  ·  API em http://localhost:8080
services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=baluarte-v2-docker-secret-troque
      - PORT=8080
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    environment:
      # o proxy /api do Vite aponta para o serviço backend na rede do compose
      - VITE_API_TARGET=http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
